    Research Experience:
      - bullet: "**What It Takes to Solve the Hubble Tension through Modifications of Cosmological Recombination II** — Johns Hopkins University, Baltimore, MD; with Dr. Nanoom Lee and Prof. Marc Kamionkowski's group; Jun 2025–present. Developed data-driven recombination-history modifications using ACT DR6 CMB and DESI DR2 BAO data to test whether recombination physics can resolve the Hubble tension."

      - bullet: "**Model-Independent Probe of Dark Sector Physics** — Haverford College, Haverford, PA; with Prof. Daniel Grin; May 2023–present. Developed generalized-dark-matter and principal-component-analysis methods for testing dark-sector models against cosmological observables."

      - bullet: "**Spectral Representations and Inverse Stellar Structure for Neutron Stars** — University of California, San Diego, La Jolla, CA; with Dr. Lee Lindblom; Jun 2024–Oct 2024. Constructed Chebyshev-based representations of neutron-star equations of state and quantified how noisy mass-radius data affect inverse stellar-structure inference."

    Specialized Training and Summer Schools:
      - bullet: "**Perimeter Scholars International Start Satellite Program**, Bishop's University, May 2025. Topics included path integrals, quantum information and thermodynamics, numerical methods, condensed matter physics, and symmetries."

      - bullet: "**ACT + SPT CMB Analysis Summer School**, The University of Chicago, Jul 2024. Summer school on analysis methods for cosmic microwave background data."

