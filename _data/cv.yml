      - bullet: "**The Behavior of the Equation of State and the Sound Speed for the Dark Matter Fluid in the Wess-Zumino Dark Radiation Model**, Keck Northeast Astronomy Consortium, Wesleyan University, Oct 2023. Oral presentation."

      - bullet: "**The Behavior of the Equation of State and the Sound Speed for the Dark Matter Fluid in the Wess-Zumino Dark Radiation Model**, KINSC Undergraduate Science Research Symposium, Haverford College, Sep 2023. Poster presentation."

    Teaching and Service:
      - bullet: "**IDEA Seminar Student Organizer**, Haverford College Department of Physics and Astronomy, Sep 2022–present. Organized a department-wide Cosmology Colloquium, led student-faculty panels on inclusion, diversity, equity, and accessibility, and helped analyze a departmental climate survey."

      - bullet: "**Teaching Assistant and Grader**, Haverford College Department of Physics and Astronomy, Sep 2023–present. Served as TA and grader for general relativity, waves and optics, and introductory quantum mechanics; held office hours; and provided feedback on weekly written assignments."

